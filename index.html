<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sürpriz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'VT323', monospace; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; touch-action: none; image-rendering: pixelated; position: fixed; top: 0; left: 0; }

  #overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(2px);
    display: flex; align-items: center; justify-content: center; z-index: 100;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  #overlay.active { opacity: 1; pointer-events: all; }
  .dialog-box {
    background: #fff9fb; border: 6px solid #000; border-radius: 16px;
    padding: 28px 24px; max-width: 320px; width: 88%;
    box-shadow: 0 10px 0px rgba(0,0,0,0.2);
    text-align: center; position: relative; animation: popIn 0.3s ease;
  }
  @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .step-badge { display: inline-block; background: #000; color: #fff; padding: 6px 14px; font-size: 1.3rem; border-radius: 8px; margin-bottom: 18px; }
  .dialog-box h2 { font-size: 2rem; color: #ad1457; margin-bottom: 10px; text-transform: uppercase; }
  .dialog-box p { font-size: 1.5rem; color: #000; line-height: 1.2; margin-bottom: 22px; }
  .dialog-box input[type=text] {
    width: 100%; padding: 12px; border: 4px solid #000; border-radius: 8px;
    font-size: 1.6rem; color: #000; background: #fff; outline: none; margin-bottom: 12px; text-align: center;
  }
  .dialog-box input[type=text]:focus { border-color: #f06292; }
  .btn {
    display: inline-block; background: #f06292; color: #000;
    border: 6px solid #000; border-radius: 12px; padding: 10px 24px; font-size: 1.7rem;
    cursor: pointer; width: 100%; box-shadow: 0 6px 0px #000;
    transition: transform 0.1s, box-shadow 0.1s; text-transform: uppercase; font-weight: bold;
  }
  .btn:active { transform: translateY(6px); box-shadow: 0px 0px 0px #000; }
  .error-msg { color: #e11d48; font-size: 1.3rem; margin-top: -6px; margin-bottom: 14px; min-height: 20px; }
  .puzzle-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;
    width: 250px; height: 250px; margin: 0 auto 20px; background: #000; border: 6px solid #000; border-radius: 12px; padding: 4px;
  }
  .puzzle-piece { background-color: #f06292; background-size: 300% 300%; border-radius: 6px; cursor: pointer; transition: transform 0.1s; }
  .puzzle-piece.selected { transform: scale(0.85); box-shadow: 0 0 0 4px #fff; z-index: 2; position: relative; }
  .clicker-area { font-size: 5rem; user-select: none; cursor: pointer; margin-bottom: 15px; transition: transform 0.05s; }
  .clicker-area:active { transform: scale(0.9) translateY(4px); }
  .progress-bg { width: 100%; height: 26px; background: #fff; border: 4px solid #000; border-radius: 8px; margin-bottom: 20px; overflow: hidden; }
  .progress-fill { height: 100%; background: #e91e63; width: 0%; transition: width 0.1s; }
  .coupon-box { border: 5px dashed #e91e63; padding: 20px 15px; background: #fff; margin-top: 5px; margin-bottom: 15px; border-radius: 12px; }
  .coupon-title { color: #ad1457; margin-bottom: 8px; font-size: 1.8rem; text-transform: uppercase; }
  .coupon-desc { font-size: 1.4rem; color: #000; }
  #giftBtnContainer { display: none; position: fixed; bottom: 30px; left: 0; width: 100%; text-align: center; z-index: 50; }
  #giftBtnContainer .btn { width: auto; background: #e91e63; color: #fff; box-shadow: 0 6px 0px #000; padding: 12px 30px; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="overlay"><div class="dialog-box" id="dialogBox"></div></div>
<div id="giftBtnContainer"><button class="btn" onclick="showCoupon()">🎁 HEDİYENİ AÇ</button></div>
<script>
let KIZ_ARKADAS_PNG = "https://lh3.googleusercontent.com/d/1F7sgARI3-J-a0HJS5aLEtgfh4EfsNDGW";
let OMER_PNG          = "https://lh3.googleusercontent.com/d/1GSxNLRN6rljDdapwnCgUI5ipg6WKkpDI";
let CIM_ARKA_PLAN_PNG = "https://lh3.googleusercontent.com/d/18LHiKyND7OsVdhBPckOmJBF6t0Flffgk";
let ADIM3_FOTOGRAF_JPG= "https://lh3.googleusercontent.com/d/1QFBKlv8wimnXq__6jGjDrysxKuVtFCV4";
const bgMusic = new Audio("muzik.mp3");
bgMusic.loop = true; // Müzik bitince başa sarsın
bgMusic.volume = 0.3; // Ses çok yüksek olup rahatsız etmesin, arka planda tatlı tatlı çalsın

  
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

// HiDPI / bulanıklık düzeltmesi
let DPR = 1;
function resize() {
  DPR = window.devicePixelRatio || 1;
  const W = window.innerWidth, H = window.innerHeight;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  canvas.width  = W * DPR;
  canvas.height = H * DPR;
  ctx.scale(DPR, DPR);
  buildPath();
  setupJoystick();
  placeOmer();
}

// Mantıksal ekran boyutu (DPR'siz)
function LW() { return window.innerWidth; }
function LH() { return window.innerHeight; }

window.addEventListener('resize', resize);

function loadImg(src) {
  return new Promise(res => {
    if (!src || src === "") { res(null); return; }
    const img = new Image();
    img.onload = () => res(img); img.onerror = () => res(null); img.src = src;
  });
}

let imgPlayer = null, imgOmer = null, imgBg = null, imgPhoto = null;
async function loadAssets() {
  const r = await Promise.all([loadImg(KIZ_ARKADAS_PNG), loadImg(OMER_PNG), loadImg(CIM_ARKA_PLAN_PNG), loadImg(ADIM3_FOTOGRAF_JPG)]);
  imgPlayer = r[0]; imgOmer = r[1]; imgBg = r[2]; imgPhoto = r[3];
}

let waypoints = [], pathPoints = [];
function buildPath() {
  const W = LW(), H = LH();
  // Eşit aralıklı, doğal kıvrımlı yol (S şeklinde yumuşak)
  const step = H / 6;
  waypoints = [
    { x: W * 0.50, y: H - step * 0.4 },  // spawn
    { x: W * 0.22, y: H - step * 1.2 },  // adım 1
    { x: W * 0.72, y: H - step * 2.2 },  // adım 2
    { x: W * 0.24, y: H - step * 3.2 },  // adım 3
    { x: W * 0.74, y: H - step * 4.2 },  // adım 4
    { x: W * 0.50, y: H - step * 5.2 },  // adım 5 / Ömer
  ];
  pathPoints = waypoints;
}

const state = { step:0, stepDone:[false,false,false,false,false], paused:false, finalTriggered:false, showBubble:false };
const player = { x:0, y:0, w:52, h:68, speed:2.5, vx:0, vy:0, facing:1, animT:0 };
function spawnPlayer() { player.x = waypoints[0].x; player.y = waypoints[0].y; }
const omer = { x:0, y:0, w:56, h:76, animT:0 };
function placeOmer() { omer.x = waypoints[5].x + 40; omer.y = waypoints[5].y; }

const hearts = [];
function spawnHearts() {
  // Optimizasyon: Arka planda birikip oyunu kastırmaması için ekranda 75'ten fazla kalp varsa yenisini üretme
  if (hearts.length > 75) return; 

  for (let i=0; i<25; i++) {
    hearts.push({
      x: omer.x, y: omer.y - 20,
      vx: (Math.random()-0.5)*8, vy: -(Math.random()*5+3),
      size: Math.random()*15+8, alpha: 1,
      color: ['#e11d48','#f43f5e','#fb7185','#fda4af'][Math.floor(Math.random()*4)],
      rot: Math.random()*Math.PI*2, rotV: (Math.random()-0.5)*0.1
    });
  }
}

function drawBackground() {
  const W = LW(), H = LH();
  if (imgBg) { ctx.drawImage(imgBg, 0, 0, W, H); return; }
  ctx.fillStyle = '#66bb6a'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#81c784';
  for(let i=0; i<150; i++) { ctx.fillRect(Math.sin(i*1.3)*W*0.5+W*0.5, Math.cos(i*1.7)*H*0.5+H*0.5, 4, 4); }
}

// Bezier eğrili yol çizimi
function drawPath() {
  const pts = pathPoints; if (pts.length < 2) return;
  ctx.save();

  function drawSmoothLine(width, color, dash) {
    ctx.lineWidth = width; ctx.strokeStyle = color; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    if (dash) ctx.setLineDash(dash); else ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i=0; i<pts.length-1; i++) {
      const cx = (pts[i].x + pts[i+1].x) / 2;
      const cy = (pts[i].y + pts[i+1].y) / 2;
      ctx.quadraticCurveTo(pts[i].x, pts[i].y, cx, cy);
    }
    ctx.lineTo(pts[pts.length-1].x, pts[pts.length-1].y);
    ctx.stroke();
  }

  drawSmoothLine(46, 'rgba(0,0,0,0.1)');
  drawSmoothLine(42, '#d4a373');
  drawSmoothLine(2, '#bc8a5f', [8,8]);
  ctx.setLineDash([]);

  // Adım daireleri (Yenilenmiş şık tasarım)
  for (let i=1; i<=5; i++) {
    const wp = waypoints[i], done = state.stepDone[i-1];
    ctx.save();
    
    // Hafif gölge ekleyelim ki buton gibi havada dursun
    ctx.shadowColor = 'rgba(0,0,0,0.4)';
    ctx.shadowBlur = 8;
    ctx.shadowOffsetY = 4;

    // Dış Beyaz Çerçeve
    ctx.beginPath(); ctx.arc(wp.x, wp.y, 22, 0, Math.PI*2); 
    ctx.fillStyle = '#fff'; ctx.fill();

    // Gölgeyi kapatalım ki iç renge yansımasın
    ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

    // İç Renk (Yapıldıysa pembe, yapılmadıysa estetik koyu gri)
    ctx.beginPath(); ctx.arc(wp.x, wp.y, 16, 0, Math.PI*2); 
    ctx.fillStyle = done ? '#e91e63' : '#2d3436'; ctx.fill();
    
    // Sayı (Büyütüldü ve tam merkeze alındı)
    ctx.fillStyle = '#fff'; 
    ctx.font = `bold 24px 'VT323'`; 
    ctx.textAlign = 'center'; 
    ctx.textBaseline = 'middle'; 
    ctx.fillText(i, wp.x, wp.y + 2); // Font anatomisinden dolayı +2 merkeze oturtur
    
    ctx.restore();
  }
  ctx.restore();
}

function drawChar(img, x, y, w, h, animT, facing, color, label) {
  ctx.save(); ctx.translate(x, y); ctx.scale(facing, 1);
  const bob = Math.floor(Math.sin(animT * 0.18) * 3);
  if (img) {
    const ratio = img.width / img.height;
    const dw = h * ratio;
    ctx.drawImage(img, -dw/2, -h + bob, dw, h);
  } else {
    ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.beginPath(); ctx.ellipse(0, 4+bob, w*0.3, 6, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = color; ctx.beginPath(); ctx.roundRect(-w*0.22, -h*0.6+bob, w*0.44, h*0.6, 8); ctx.fill();
    ctx.fillStyle = '#ffcc80'; ctx.beginPath(); ctx.roundRect(-w*0.3, -h*0.6+bob-w*0.5, w*0.6, w*0.55, 10); ctx.fill();
    ctx.fillStyle = '#000'; ctx.fillRect(-8, -h*0.6+bob-w*0.3, 4, 4); ctx.fillRect(4, -h*0.6+bob-w*0.3, 4, 4);
  }
  if (label) {
    ctx.scale(facing, 1);
    ctx.font = `20px 'VT323'`; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
    ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
    ctx.strokeText(label, 0, 15); ctx.fillText(label, 0, 15);
  }
  ctx.restore();
}
  
function drawBubble(charX, charY, text) {
  ctx.save();
  const pad = 16;
  ctx.font = `20px 'VT323'`;
  const lines = text.split('\n');
  const tw = Math.max(...lines.map(l => ctx.measureText(l).width));
  const bw = tw + pad*2, bh = lines.length*22 + pad*2;
  const margin = 10;
  
  // Balonu karakterin daha da soluna alıyoruz (aradaki boşluğu 10'dan 30'a çıkardık)
  let bx = charX - bw - 30;
  let by = charY - bh - 10; 

  if (bx < margin) bx = margin;
  if (by < margin) by = margin;

  // Siyah gölge ve beyaz arka plan
  ctx.fillStyle = '#000'; ctx.beginPath(); ctx.roundRect(bx-4, by-4, bw+8, bh+8, 12); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 10); ctx.fill();

  // Metni yazdır
  ctx.fillStyle = '#000'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const cx = bx + bw/2;
  lines.forEach((line, i) => { ctx.fillText(line, cx, by + pad + 11 + i*22); });
  ctx.restore();
}
  
function updateHearts() {
  for (let i=hearts.length-1; i>=0; i--) {
    const h=hearts[i]; h.x+=h.vx; h.y+=h.vy; h.vy+=0.2;
    h.rot+=h.rotV; h.alpha-=0.01; if(h.alpha<=0) hearts.splice(i,1);
  }
}
function drawHeartsLayer() {
  hearts.forEach(h => {
    ctx.save(); ctx.translate(h.x,h.y); ctx.rotate(h.rot); ctx.globalAlpha=h.alpha; ctx.fillStyle=h.color;
    ctx.beginPath(); const s=h.size/20; ctx.scale(s,s);
    ctx.moveTo(0,-5); ctx.bezierCurveTo(0,-10,-10,-10,-10,-2); ctx.bezierCurveTo(-10,5,0,12,0,16); ctx.bezierCurveTo(0,12,10,5,10,-2); ctx.bezierCurveTo(10,-10,0,-10,0,-5); ctx.fill(); ctx.restore();
  });
}

const joy = { active:false, id:-1, cx:0, cy:0, r:50, kr:22, dx:0, dy:0 };
function setupJoystick() { joy.cx = LW()*0.78; joy.cy = LH()*0.84; }

function drawJoystick() {
  if (state.paused) return;
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.beginPath(); ctx.arc(joy.cx,joy.cy,joy.r,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#000'; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(joy.cx,joy.cy,joy.r,0,Math.PI*2); ctx.stroke();
  const kx=joy.cx+joy.dx*joy.r*0.6, ky=joy.cy+joy.dy*joy.r*0.6;
  ctx.fillStyle='#e91e63'; ctx.beginPath(); ctx.arc(kx,ky,joy.kr,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#000'; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(kx,ky,joy.kr,0,Math.PI*2); ctx.stroke();
  ctx.restore();
}

function handleTouchStart(e) {
  e.preventDefault();
  for (let i=0;i<e.changedTouches.length;i++) {
    const t=e.changedTouches[i], dx=t.clientX-joy.cx, dy=t.clientY-joy.cy;
    if (!joy.active && Math.hypot(dx,dy)<joy.r+30) { joy.active=true; joy.id=t.identifier; updateJoy(t); }
  }
}
function handleTouchMove(e) { e.preventDefault(); for (let i=0;i<e.changedTouches.length;i++) if (e.changedTouches[i].identifier===joy.id) updateJoy(e.changedTouches[i]); }
function handleTouchEnd(e) { for (let i=0;i<e.changedTouches.length;i++) if (e.changedTouches[i].identifier===joy.id) { joy.active=false; joy.id=-1; joy.dx=0; joy.dy=0; } }
function updateJoy(t) {
  const dx=t.clientX-joy.cx, dy=t.clientY-joy.cy, dist=Math.hypot(dx,dy);
  if (dist>0) { joy.dx=dx/Math.max(dist,joy.r); joy.dy=dy/Math.max(dist,joy.r); } else { joy.dx=0; joy.dy=0; }
}
canvas.addEventListener('touchstart', handleTouchStart, {passive:false});
canvas.addEventListener('touchmove',  handleTouchMove,  {passive:false});
canvas.addEventListener('touchend',   handleTouchEnd,   {passive:false});

function checkStepReached() {
  for (let i=1;i<=4;i++) {
    if (state.stepDone[i-1]) continue;
    if (i>state.step+1) continue;
    if (Math.hypot(player.x-waypoints[i].x, player.y-waypoints[i].y)<38) { triggerStep(i); return; }
  }
}
function getMaxAllowedY() { for (let i=1;i<=4;i++) { if (!state.stepDone[i-1]) return waypoints[i].y-10; } return -Infinity; }
function triggerStep(n) { state.paused=true; if(n===1)showStep1(); else if(n===2)showStep2(); else if(n===3)showStep3(); else if(n===4)showStep4(); }
function showOverlay(html) { document.getElementById('dialogBox').innerHTML=html; document.getElementById('overlay').classList.add('active'); }
function hideOverlay() { document.getElementById('overlay').classList.remove('active'); state.paused=false; }
function doneStep(n) { state.stepDone[n-1]=true; state.step=n; hideOverlay(); }

let step1ClickCount = 0;
const step1Scores = [1, 5, 25, 150, 800, 4200, 18000, 45000, 80000, 99999];

function showStep1() {
  step1ClickCount = 0;
  showOverlay(`
    <span class="step-badge">ADIM 1 / 5</span>
    <h2>Yolculuğa Hoş Geldin</h2>
    <p>Ömer seni bugün tam <br><span id="missScore" style="font-size: 3rem; color: #e91e63; font-weight: bold; display: inline-block; margin: 10px 0;">1</span><br> kez özledi! ❤️</p>
    
    <div class="clicker-area" id="step1Heart" onclick="doStep1Click()">🤍</div>
    <button class="btn" id="step1Continue" onclick="doneStep(1)" style="display:none;">YOLCULUĞA DEVAM ET</button>
  `);
}

function doStep1Click() {
  step1ClickCount++;
  
  // Kalp tıklama efekti
  const heartEl = document.getElementById('step1Heart');
  if (heartEl) {
    heartEl.textContent = '❤️';
    setTimeout(() => { if (heartEl) heartEl.textContent = '🤍'; }, 100);
  }

  // Skoru diziden alarak katlanarak artır
  let currentScore = 99999;
  if (step1ClickCount < step1Scores.length) {
    currentScore = step1Scores[step1ClickCount];
  }

  const scoreEl = document.getElementById('missScore');
  if (scoreEl) scoreEl.textContent = currentScore;

  // Hedefe ulaşıldığında işlemleri yap
  if (currentScore >= 99999) {
    // 1. Kalbi anında gizle (tıklama boşa düşsün)
    if (heartEl) heartEl.style.display = 'none';
    if (scoreEl) scoreEl.textContent = '+99999';

    // 2. Butonu hemen gösterme! Kullanıcının okuyabilmesi için 2.5 saniye (2500ms) bekle
    setTimeout(() => {
      const btn = document.getElementById('step1Continue');
      if (btn) btn.style.display = 'inline-block';
    }, 2500); 
  }
}

function showStep2() {
  showOverlay(`<span class="step-badge">ADIM 2 / 5</span><h2>HAFIZA TESTİ</h2><p>İlk oynadığımız oyun hangisiydi?</p><input type="text" id="qInput" autocomplete="off"/><div class="error-msg" id="qErr"></div><button class="btn" onclick="checkQ()">CEVAPLA</button>`);
}
function checkQ() {
  const v=(document.getElementById('qInput')?.value||'').trim().toLowerCase().replace(/\s+/g,'');
  if (v==='residentevil7') doneStep(2); else document.getElementById('qErr').textContent='TEKRAR DÜŞÜN :)';
}

let puzzleArr=[], selIdx=-1;

function showStep3() {
  do { puzzleArr=[0,1,2,3,4,5,6,7,8].sort(()=>Math.random()-0.5); } while(puzzleArr.every((v,i)=>v===i)); selIdx=-1;
  showOverlay(`
    <span class="step-badge" id="step3Badge">ADIM 3 / 5</span>
    <h2 id="step3Title">FOTOĞRAFI TAMAMLA</h2>
    <p id="step3Desc">Yerlerini değiştirmek için 2 kareye dokun.</p>
    <div id="pGrid" class="puzzle-grid"></div>
    <button class="btn" id="step3Btn" onclick="doneStep(3)" style="display:none; animation: popIn 0.3s ease;">DEVAM ET</button>
  `);
  renderPuzzle();
}

function renderPuzzle() {
  const g = document.getElementById('pGrid'); 
  if(!g) return; 
  g.innerHTML='';
  puzzleArr.forEach((v,i) => {
    const d = document.createElement('div'); 
    d.className='puzzle-piece'; 
    if(i===selIdx) d.classList.add('selected');
    d.style.backgroundImage=`url('${ADIM3_FOTOGRAF_JPG||"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII="}')`;
    d.style.backgroundPosition=`${(v%3)*50}% ${Math.floor(v/3)*50}%`;
    d.onclick = () => { 
      if(selIdx===-1) {
        selIdx=i; renderPuzzle();
      } else {
        [puzzleArr[i],puzzleArr[selIdx]]=[puzzleArr[selIdx],puzzleArr[i]];
        selIdx=-1; renderPuzzle(); checkPuzzle();
      } 
    };
    g.appendChild(d);
  });
}

function checkPuzzle() { 
  if(puzzleArr.every((v,i) => v===i)){
    // 1. Puzzle biter bitmez aradaki boşlukları sıfırla, parçaları birleştirip tam bir fotoğraf yap
    const grid = document.getElementById('pGrid');
    if(grid) {
      grid.style.gap = '0px';
      grid.style.padding = '0px';
      grid.style.overflow = 'hidden'; // Dış kenarlar yuvarlak kalsın
      // İç parçaların kenar yuvarlaklığını ve tıklanma özelliklerini kapat
      Array.from(grid.children).forEach(p => { 
        p.onclick = null; 
        p.style.borderRadius = '0px'; 
      });
    }

    // 2. Fotoğrafın tadını çıkarabilmesi için 1.2 saniye bekle, sonra butonu ve yazıları değiştir
    setTimeout(() => {
      const badge = document.getElementById('step3Badge');
      if (badge) badge.style.display = 'none';
      
      const title = document.getElementById('step3Title');
      if (title) title.textContent = 'HARİKA!';
      
      const desc = document.getElementById('step3Desc');
      if (desc) desc.textContent = 'İşte o en sevdiğim gülüşün...';
      
      const btn = document.getElementById('step3Btn');
      if (btn) btn.style.display = 'inline-block';
    }, 1200); 
  } 
}


function showStep4() {
  showOverlay(`
    <span class="step-badge">ADIM 4 / 5</span>
    <h2>KOZMİK BAĞ</h2>
    <p>Yıldızları sırayla birleştirerek gökyüzüne imzanızı at!</p>
    <div style="position:relative; width:100%; max-width:300px; aspect-ratio:15/8; margin: 0 auto 20px; border:4px solid #000; border-radius:12px; background:#070714; overflow:hidden;">
      <canvas id="starCanvas" width="300" height="160" style="position:absolute; inset:0; width:100%; height:100%; z-index:2; touch-action:none;"></canvas>
    </div>

  `);
  
  setTimeout(initStars, 50);

function initStars() {
  const cvs = document.getElementById('starCanvas');
  if(!cvs) return;
  const ctx = cvs.getContext('2d');

  // D + KALP + Ö Şekillerinin Sıralı Koordinatları
  const points = [
    // --- D HARFİ ---
    {x: 35, y: 125}, // 1 - Başlangıç (D sol alt)
    {x: 35, y: 45},  // 2 (D sol üst)
    {x: 65, y: 45},  // 3
    {x: 80, y: 65},  // 4
    {x: 80, y: 105}, // 5
    {x: 65, y: 125}, // 6
    {x: 35, y: 125}, // 7 (D kapandı)
    
    // --- GEÇİŞ VE KALP HARFİ ---
    {x: 150, y: 130}, // 8 (Kalp alt uç)
    {x: 115, y: 85},  // 9
    {x: 115, y: 55},  // 10
    {x: 150, y: 75},  // 11 (Kalp orta çukur)
    {x: 185, y: 55},  // 12
    {x: 185, y: 85},  // 13
    {x: 150, y: 130}, // 14 (Kalp kapandı)
    
    // --- GEÇİŞ VE Ö HARFİ ---
    {x: 250, y: 120}, // 15 (Ö alt orta)
    {x: 225, y: 95},  // 16 (Ö sol alt)
    {x: 225, y: 65},  // 17 (Ö sol üst)
    {x: 250, y: 40},  // 18 (Ö üst orta)
    {x: 275, y: 65},  // 19 (Ö sağ üst)
    {x: 275, y: 95},  // 20 (Ö sağ alt)
    {x: 250, y: 120}, // 21 (Ö çemberi kapandı)
    {x: 235, y: 15, jump: true}, // 22 (Ö sol nokta - Atlayarak geçilir)
    {x: 265, y: 15, jump: true}  // 23 (Ö sağ nokta - Atlayarak geçilir)
  ];

  let targetIdx = 1; 
  let isDragging = false;
  let dragPos = null;
  let completed = false;

  const bgStars = Array.from({length: 45}, () => ({
    x: Math.random()*300, 
    y: Math.random()*160, 
    r: Math.random()*1.5 + 0.5, 
    seed: Math.random() * 100
  }));

  function draw() {
    ctx.clearRect(0, 0, 300, 160);

    // Arka Plan Yıldızları
    bgStars.forEach(s => {
      ctx.fillStyle = '#fff';
      ctx.globalAlpha = Math.abs(Math.sin(Date.now() * 0.002 + s.seed)) * 0.6 + 0.2;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Neon Ayarları
    if (completed) {
      ctx.shadowBlur = 12 + Math.sin(Date.now() * 0.006) * 4;
      ctx.shadowColor = '#f06292';
      ctx.strokeStyle = '#f06292';
      ctx.lineWidth = 4;
    } else {
      ctx.shadowBlur = 4;
      ctx.shadowColor = '#4dd0e1';
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2.5;
    }
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // Sabit Çizgiler
    ctx.beginPath();
    for(let i=0; i<targetIdx; i++) {
      if(i === 0 || points[i].jump) {
        ctx.moveTo(points[i].x, points[i].y);
      } else {
        ctx.lineTo(points[i].x, points[i].y);
      }
    }
    
    // Parmakla Kaydırılan Çizgi
    if(isDragging && dragPos && !completed) {
      if (points[targetIdx] && points[targetIdx].jump) {
        // Eğer hedef nokta atlamalı (noktalar) ise şeffaf/kesik bir kılavuz çizgi göster
        ctx.stroke(); 
        ctx.beginPath(); 
        ctx.moveTo(points[targetIdx-1].x, points[targetIdx-1].y);
        ctx.lineTo(dragPos.x, dragPos.y);
        ctx.save();
        ctx.setLineDash([4, 6]);
        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        ctx.stroke();
        ctx.restore();
        ctx.beginPath(); 
      } else {
        ctx.lineTo(dragPos.x, dragPos.y);
      }
    }
    ctx.stroke();
    
    ctx.shadowBlur = 0;

    // Yıldız Düğümleri
    points.forEach((p, i) => {
      if((i === 6 && targetIdx < 6) || (i === 13 && targetIdx < 13) || (i === 20 && targetIdx < 20)) return;
      
      const isReached = i < targetIdx;
      const isNext = i === targetIdx;
      
      if (completed) {
        ctx.fillStyle = '#e91e63';
        ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
      } else {
        ctx.fillStyle = isReached ? '#e91e63' : (isNext ? '#ffeb3b' : 'rgba(255,255,255,0.3)');
        ctx.beginPath(); 
        let radius = isNext ? 6 + Math.sin(Date.now() * 0.01) * 2 : 4;
        ctx.arc(p.x, p.y, radius, 0, Math.PI*2); 
        ctx.fill();

        if(isNext) {
          ctx.fillStyle = '#fff';
          ctx.font = "16px 'VT323'";
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(i+1, p.x, p.y - 14);
        }
      }
    });
    
    requestAnimationFrame(draw);
  }

  requestAnimationFrame(draw);

  // Responsive Ekranlar İçin Ölçeklenmiş Koordinat Hesaplayıcı
  function getPos(e) {
    const rect = cvs.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    // CSS ile küçülen canvasın gerçek çözünürlüğüne dokunmayı oranlıyoruz
    const scaleX = 300 / rect.width;
    const scaleY = 160 / rect.height;
    
    return { 
      x: (clientX - rect.left) * scaleX, 
      y: (clientY - rect.top) * scaleY 
    };
  }

  function handleStart(e) {
    if(completed) return;
    const pos = getPos(e);
    const lastP = points[targetIdx - 1];
    if(Math.hypot(pos.x - lastP.x, pos.y - lastP.y) < 35) {
      isDragging = true;
      dragPos = pos;
      e.preventDefault();
    }
  }

  function handleMove(e) {
    if(!isDragging || completed) return;
    e.preventDefault();
    dragPos = getPos(e);
    
    const nextP = points[targetIdx];
    if(Math.hypot(dragPos.x - nextP.x, dragPos.y - nextP.y) < 22) {
      targetIdx++;
      if(targetIdx === points.length) {
        completed = true;
        isDragging = false;
        document.getElementById('step4Continue').style.display = 'inline-block';
      }
    }
  }

  function handleEnd() { isDragging = false; dragPos = null; }

  cvs.addEventListener('mousedown', handleStart);
  cvs.addEventListener('mousemove', handleMove);
  cvs.addEventListener('mouseup', handleEnd);
  cvs.addEventListener('mouseleave', handleEnd);
  
  cvs.addEventListener('touchstart', handleStart, {passive:false});
  cvs.addEventListener('touchmove', handleMove, {passive:false});
  cvs.addEventListener('touchend', handleEnd);
}

  
function checkFinal() {
  if (!state.stepDone[3]) return;
  if (Math.hypot(player.x-omer.x, player.y-omer.y)<70) {
    state.showBubble=true;
    if (!state.finalTriggered) { state.finalTriggered=true; spawnHearts(); setInterval(spawnHearts,2500); setTimeout(()=>{document.getElementById('giftBtnContainer').style.display='block';},1000); }
  } else { state.showBubble=false; }
}

  showOverlay(`

    <p style="font-size: 1.4rem; line-height: 1.6; margin-bottom: 25px; text-align: center; padding: 0 10px; font-style: italic;">
      Sana olan özlemimin her geçen gün daha da arttığı,<br>
      En güzel anıları kalbimizde biriktirdiğimiz,<br>
      Eksik parçaları gülüşünle tamamlayıp kendi yıldızımızı çizdiğimiz bu yolda...<br><br>
      Benim en büyük hediyem de, en tatlı bayram şekerim de sensin.<br>
      Seni çok seviyorum birtanem! 🍬🌸

function update() {
  if (state.paused) return;
  let ix=joy.dx, iy=joy.dy; const mag=Math.hypot(ix,iy); if(mag>1){ix/=mag;iy/=mag;}
  player.vx=ix*player.speed; player.vy=iy*player.speed;
  if(Math.abs(ix)>0.05||Math.abs(iy)>0.05){player.animT++;if(ix!==0)player.facing=ix>0?1:-1;}
  let nx=player.x+player.vx, ny=player.y+player.vy, maxY=getMaxAllowedY();
  if(ny<maxY)ny=maxY;
  nx=Math.max(player.w/2,Math.min(LW()-player.w/2,nx));
  ny=Math.max(player.h/2,Math.min(LH()-player.h/2,ny));
  player.x=nx; player.y=ny; omer.animT++; updateHearts(); checkStepReached(); checkFinal();
}

function draw() {
  ctx.save();
  ctx.clearRect(0,0,LW(),LH());
  drawBackground(); drawPath();

  // --- SİHİRLİ ORMAN ATMOSFERİ (Kenar Karartması - Vignette) ---
  const W = LW(), H = LH();
  const grad = ctx.createRadialGradient(W/2, H/2, W*0.3, W/2, H/2, Math.max(W,H)*0.8);
  grad.addColorStop(0, 'rgba(0,0,0,0)');       // Ortalar aydınlık
  grad.addColorStop(1, 'rgba(0,0,0,0.6)');     // Kenarlar karanlık
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  if (state.stepDone[3]) {
    drawChar(imgOmer,omer.x,omer.y,omer.w,omer.h,omer.animT,-1,'#42a5f5','Ömer');
    if (state.showBubble) drawBubble(omer.x, omer.y - omer.h, 'İyi bayramlar\nbirtanem,\nseni çok\nseviyorum! 🌸');
  }
  drawChar(imgPlayer,player.x,player.y,player.w,player.h,player.animT,player.facing,'#e91e63','Dila');

  // --- UÇUŞAN ATEŞ BÖCEKLERİ (Fireflies) ---
  const time = Date.now() * 0.001;
  ctx.fillStyle = '#ffeb3b'; // Parlak sarı
  for(let i=0; i<35; i++) {
    // Parçacıkların rüzgarda uçuşma matematiği
    const fx = ((Math.sin(time*0.5+i)*W*0.5 + Math.cos(i*112)*W) % W + W) % W;
    const fy = ((Math.cos(time*0.3+i*3)*H*0.5 + Math.sin(i*31)*H) % H + H) % H;
    // Kendi kendine yanıp sönme (Pulse)
    ctx.globalAlpha = (Math.sin(time*3+i)+1)*0.5 * 0.8; 
    ctx.beginPath(); ctx.arc(fx, fy, Math.random()*1.5 + 1, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  // -----------------------------------------

  drawHeartsLayer(); drawJoystick();
  ctx.restore();
}

function showStartScreen() {
  state.paused = true;
  showOverlay(`
    <h2 style="font-size: 2.2rem; color: #e91e63; margin-bottom: 15px;">SANA BİR SÜRPRİZİM VAR! 🌸</h2>
    <p style="font-size: 1.5rem; line-height: 1.4; margin-bottom: 25px;">
      Sana özel küçük bir macera hazırladım birtanem.<br><br>
      Yol üzerindeki numaralı adımları sırayla takip et, görevleri tamamla ve sonundaki sürprizine ulaş! ❤️
    </p>
    <button class="btn" onclick="startGame()">MACERAYA BAŞLA 🚀</button>
  `);
}

// Bu yeni fonksiyon butona basıldığında müziği başlatıp ekranı kapatacak
function startGame() {
  bgMusic.play().catch(e => console.log("Müzik engellendi:", e));
  hideOverlay();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
async function init() { 
  await loadAssets(); 
  resize(); 
  spawnPlayer(); 
  showStartScreen(); // Oyun açılır açılmaz giriş ekranını tetikler
  loop(); 
}
init();

</script>
